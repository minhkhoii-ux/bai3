name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Nâng cấp lên v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Nâng cấp lên v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests and Package
        # Đảm bảo đường dẫn này đúng với vị trí file pom.xml của bạn
        run: mvn package

      - name: Save Artifact
        uses: actions/upload-artifact@v4 # ĐÂY LÀ CHỖ CẦN SỬA CHÍNH
        with:
          name: my-jar-file
          path: week9/bai3/target/*.jar
